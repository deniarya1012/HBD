<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> Hello! My Universe🤍</title>

    <!-- Tailwind CSS v4 & Animate.css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1543722530-d2c3201371e7?q=80&w=2074&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden;
            /* Mencegah overscroll behavior di HP */
            overscroll-behavior: none;
        }

        /* Efek Glassmorphism */
        .glass {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            z-index: 10;
        }

        /* Custom scrollbar tipis untuk area teks di HP */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #f472b6;
            border-radius: 10px;
        }

        /* --- BACKGROUND BINTANG BERKEDIP --- */
        .stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px rgba(255, 255, 255, 0.8); }
        }
    </style>
</head>

<body class="min-h-screen flex justify-center items-center p-4 sm:p-6 select-none">

    <!-- LAYER COUNTDOWN FULLSCREEN (Menutupi Semua Konten) -->
    <div id="countdownLayer" class="fixed inset-0 bg-gradient-to-br from-pink-400 via-pink-500 to-rose-400 z-50 flex flex-col justify-center items-center text-white px-4 text-center transition-all duration-1000">
        <!-- Hiasan Bintang Kecil khusus di Layar Countdown -->
        <div class="absolute inset-0 opacity-40 pointer-events-none bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-white/10 via-transparent to-transparent"></div>
        
        <div class="relative z-10 animate__animated animate__fadeIn">
            <p class="text-lg sm:text-xl font-medium tracking-wide text-pink-100 mb-2">Dah ah gak jadi males, udah ada yang ngasih</p>
            <h2 class="text-2xl sm:text-3xl font-bold mb-8 drop-shadow-sm text-white/95">Countdown Apa yaa!? 🤍</h2>
            
            <!-- Box Jam Hitung Mundur Ukuran Besar -->
            <div id="countdownBox" class="flex items-center justify-center gap-3 sm:gap-5 text-center font-mono">
                <div class="bg-white/20 backdrop-blur-md rounded-2xl p-3 sm:p-5 min-w-[70px] sm:min-w-[90px] shadow-lg border border-white/20">
                    <span id="days" class="block text-3xl sm:text-5xl font-bold tracking-tight">00</span>
                    <span class="text-[10px] sm:text-xs uppercase font-sans font-semibold text-pink-100 tracking-wider">Hari</span>
                </div>
                <div class="bg-white/20 backdrop-blur-md rounded-2xl p-3 sm:p-5 min-w-[70px] sm:min-w-[90px] shadow-lg border border-white/20">
                    <span id="hours" class="block text-3xl sm:text-5xl font-bold tracking-tight">00</span>
                    <span class="text-[10px] sm:text-xs uppercase font-sans font-semibold text-pink-100 tracking-wider">Jam</span>
                </div>
                <div class="bg-white/20 backdrop-blur-md rounded-2xl p-3 sm:p-5 min-w-[70px] sm:min-w-[90px] shadow-lg border border-white/20">
                    <span id="minutes" class="block text-3xl sm:text-5xl font-bold tracking-tight">00</span>
                    <span class="text-[10px] sm:text-xs uppercase font-sans font-semibold text-pink-100 tracking-wider">Menit</span>
                </div>
                <div class="bg-white/20 backdrop-blur-md rounded-2xl p-3 sm:p-5 min-w-[70px] sm:min-w-[90px] shadow-lg border border-white/20 animate__animated animate__pulse animate__infinite">
                    <span id="seconds" class="block text-3xl sm:text-5xl font-bold tracking-tight text-yellow-200">00</span>
                    <span class="text-[10px] sm:text-xs uppercase font-sans font-semibold text-pink-100 tracking-wider">Detik</span>
                </div>
            </div>

            <p class="text-xs sm:text-sm text-pink-100/80 mt-8 font-sans">Akan terbuka otomatis pada 28 Juni 2026 pukul 00:00 WIB</p>
        </div>
    </div>

    <!-- Container Bintang Berkedip (Konten Utama) -->
    <div class="stars-container" id="starsBg"></div>

    <!-- Kartu Utama -->
    <div class="glass rounded-3xl shadow-2xl p-5 sm:p-6 w-full max-w-[360px] xs:max-w-sm sm:max-w-md animate__animated animate__backInDown">
        <div id="kartu" class="bg-white/95 rounded-2xl p-5 sm:p-6 text-center shadow-lg transition-all duration-500">
            <h2 class="text-xl sm:text-2xl font-semibold text-gray-700 mb-2">
                Happy Birthday My Universe 🤍
            </h2>
            <h1 class="text-3xl sm:text-4xl font-bold text-pink-500 animate__animated animate__pulse animate__infinite">
                Siti Mulyani
            </h1>
            <p class="text-sm sm:text-base text-gray-600 mt-3">
                Ada sesuatu yang spesial untuk sayaaaaaang hari ini 🤍✨
            </p>
            <button
                onclick="ubahKartu()"
                class="mt-5 w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3.5 rounded-xl transition duration-300 animate__animated animate__tada animate__delay-1s cursor-pointer active:scale-95 text-base shadow-sm">
                Klik Disini Sayaaaaangku 🤍
            </button>
        </div>
    </div>

    <!-- Pustaka Canvas-Confetti untuk efek bintang jatuh -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        // 1. GENERATE BINTANG BERKEDIP DI BACKGROUND
        const starsBg = document.getElementById('starsBg');
        const totalStars = 35;

        for (let i = 0; i < totalStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            const size = Math.random() * 2.5 + 1.5;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
            star.style.animationDelay = `${Math.random() * 3}s`;
            starsBg.appendChild(star);
        }

        // 2. LOGIKA JALANNYA COUNTDOWN LOCK
        const targetTime = new Date("June 28, 2026 00:00:00").getTime();
        const layer = document.getElementById("countdownLayer");

        const checkCountdown = setInterval(() => {
            const now = new Date().getTime();
            const gap = targetTime - now;

            if (gap > 0) {
                const d = Math.floor(gap / (1000 * 60 * 60 * 24));
                const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((gap % (1000 * 60)) / 1000);

                document.getElementById("days").innerText = d < 10 ? "0" + d : d;
                document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
                document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
                document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;
            } else {
                clearInterval(checkCountdown);
                layer.style.opacity = "0";
                layer.style.pointerEvents = "none";
                setTimeout(() => {
                    layer.remove();
                }, 1000);
            }
        }, 1000);

        // 3. FUNGSI SAAT TOMBOL DIKLIK (SETELAH KUNCI TERBUKA)
        let kartu = document.getElementById("kartu");

        function ubahKartu(){
            const duration = 2.5 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 45,
                    origin: { x: 0, y: 0.8 },
                    colors: ['#f472b6', '#fbbf24', '#ffffff'],
                    shapes: ['star']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 45,
                    origin: { x: 1, y: 0.8 },
                    colors: ['#f472b6', '#fbbf24', '#ffffff'],
                    shapes: ['star']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            kartu.innerHTML = `
                <div class="animate__animated animate__fadeInUp text-left">
                    <div class="mb-4 sticky top-0 bg-white/95 pt-1 pb-2 z-10 animate__animated animate__zoomIn animate__delay-1s">
                        <div class="w-full aspect-video rounded-xl overflow-hidden shadow-lg">
                            <iframe
                                class="w-full h-full"
                               src="https://www.youtube.com/embed/exIMEwsZzN8?si=LHY7eyGfgEwGjqIm" title="YouTube video player" frameborder="0" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                allowfullscreen>
                            </iframe>
                        </div>
                    </div>

                    <div class="max-h-[220px] sm:max-h-[260px] overflow-y-auto pr-1 custom-scroll text-[15px] font-medium text-gray-700 leading-relaxed space-y-4">
                        <p class="animate__animated animate__fadeInUp animate__delay-1s">
                            Sayaaaaaaangkuu 🤍<br><br>
                            Selamat ulang tahun yaa Sayaaaaangkuu...
                        </p>

                        <p class="animate__animated animate__fadeInUp animate__delay-2s">
                            Semoga di umur yang baru ini sayang selalu diberikan kesehatan,
                            kebahagiaan, umur yang panjang dan berkah, rezeki yang melimpah,
                            serta dimudahkan segala urusannya oleh Allah SWT.
                            Aamiin Ya Rabbal Alamin 🤲
                        </p>

                        <p class="animate__animated animate__fadeInUp animate__delay-3s">
                            Terima kasih sudah hadir dan menjadi bagian terindah
                            dalam hidup aa. Terima kasih sudah selalu sabar,
                            selalu mendukung, dan selalu ada di setiap cerita yang kita lalui.
                        </p>

                        <p class="animate__animated animate__fadeInUp animate__delay-4s">
                            Aa mungkin engga sempurna,
                            tapi aa akan selalu berusaha menjadi yang terbaik untuk neeeng. 
                        </p>

                        <p class="animate__animated animate__fadeInUp animate__delay-5s">
                            Semoga semua impian dan harapan yang sayaaang inginkan
                            dapat terwujud satu per satu yaaa. Semoga apa yang kita usahakan sekarang bisa terwujud di tahun depan ya sayaaangnya aa. 
                        </p>
                        
                        <p class="animate__animated animate__fadeInUp animate__delay-5s">
                            Aa akan selalu mendoakan
                            yang terbaik untuk neeeng dan untuk kita kedepannya ya sayaaaaaangku🤍 
                        </p>

                        <p class="font-bold text-pink-500 text-center text-base pt-2 animate__animated animate__heartBeat animate__delay-5s">
                            I Love You Today<br>
                            Tomorrow<br>
                            Forever<br>
                            and Always 🤍✨
                        </p>

                        <h2 class="mt-4 text-center text-pink-500 font-bold text-lg animate__animated animate__fadeIn animate__delay-5s">
                            - With Love, Deni -
                        </h2>
                    </div>

                    <div class="mt-4 space-y-2.5 animate__animated animate__fadeIn animate__delay-5s">
                        <!-- Tombol WhatsApp Tanpa Teks Otomatis -->
                        <button
                            onclick="kirimKeCalonSuami()"
                            class="w-full bg-[#25D366] hover:bg-[#20ba5a] active:scale-95 text-white font-bold py-3.5 rounded-xl transition duration-200 cursor-pointer flex items-center justify-center gap-2 shadow-md text-sm sm:text-base">
                            <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
                                <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.713-1.457L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.37 9.864-9.799.002-2.63-1.023-5.101-2.885-6.963C16.528 2.017 14.077 1 11.47 1c-5.442 0-9.87 4.372-9.874 9.802-.001 1.73.463 3.42 1.345 4.927l-.997 3.641 3.731-.976zm12.135-7.051c-.329-.165-1.947-.961-2.245-1.07-.297-.109-.514-.165-.73.165-.215.33-.836 1.05-.1023 1.244-.188.189-.377.082-.704-.083-.327-.164-1.382-.51-2.633-1.625-.973-.867-1.63-1.94-1.821-2.27-.19-.33-.02-.508.145-.671.149-.147.33-.385.495-.578.164-.193.219-.33.329-.55.11-.22.055-.412-.028-.577-.082-.165-.73-1.76-.999-2.41-.263-.636-.53-.55-.73-.561-.189-.01-.405-.01-.621-.01-.215 0-.567.081-.862.404-.296.324-1.131 1.107-1.131 2.7 0 1.593 1.157 3.13 1.319 3.35.162.22 2.278 3.48 5.521 4.881.771.333 1.373.532 1.842.681.775.247 1.48.212 2.037.129.621-.093 1.947-.796 2.221-1.53.274-.733.274-1.361.192-1.492-.082-.132-.297-.214-.627-.379z"/>
                            </svg>
                            Kirim Pesan ke Calon Suamik🤍
                        </button>

                        <button
                            onclick="refreshPage()"
                            class="w-full bg-pink-500 hover:bg-pink-600 active:scale-95 text-white font-bold py-3 rounded-xl transition duration-200 cursor-pointer text-center block text-sm sm:text-base">
                            Tutup 🤍
                        </button>
                    </div>
                </div>
            `;
        }

        // 4. FUNGSI KIRIM CHAT KE WHATSAPP DENI
        function kirimKeCalonSuami() {
            const nomorWa = "6285159941012";
            // Membuka chat kosong tanpa parameter text bawaan agar mengetik bebas
            const urlWa = `https://api.whatsapp.com/send?phone=${nomorWa}`;
            window.open(urlWa, '_blank');
        }

        function refreshPage(){
            location.reload();
        }
    </script>

</body>
</html>
