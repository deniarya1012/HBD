<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Universe 🤍</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        body{
            background-image:url('https://images.unsplash.com/photo-1543722530-d2c3201371e7?q=80&w=2074&auto=format&fit=crop');
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
        }

        .glass{
            backdrop-filter: blur(12px);
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
        }

        /* Custom scrollbar tipis agar tampilan teks tetap rapi saat di-scroll */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #f472b6;
            border-radius: 10px;
        }
    </style>
</head>

<body class="min-h-screen flex justify-center items-center p-5">

    <!-- Diubah ke max-w-lg agar kartu bisa sedikit lebih lebar dan proporsional dengan tingginya -->
    <div class="glass rounded-3xl shadow-2xl p-6 w-full max-w-lg animate__animated animate__backInDown">

        <div id="kartu" class="bg-white/90 rounded-2xl p-6 text-center shadow-lg transition-all duration-500">

            <h2 class="text-2xl font-semibold text-gray-700 mb-2">
                Happy Birthday My Universe 🤍
            </h2>

            <h1 class="text-4xl font-bold text-pink-500 animate__animated animate__pulse animate__infinite">
                Siti Mulyani
            </h1>

            <p class="text-gray-600 mt-3">
                Ada sesuatu yang spesial untuk sayaaaaaang hari ini 🤍✨
            </p>

            <button
                onclick="ubahKartu()"
                class="mt-5 w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-xl transition duration-300 animate__animated animate__tada animate__delay-1s">
                Klik Disini Sayaaaaangku 🤍
            </button>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@hiseb/confetti@2.1.0/dist/confetti.min.js"></script>

    <script>
        let kartu = document.getElementById("kartu");

        function ubahKartu(){

            confetti({
                position: { x: 0, y: 0 },
                count: 2000,
                size: 1.2,
                velocity: 400,
                fade: false
            });

            kartu.innerHTML = `
                <div class="animate__animated animate__zoomIn text-left relative">

                    <!-- Container Video FLOATING/MELAYANG -->
                    <div class="sticky top-0 bg-white/95 pt-2 pb-4 mb-4 z-10 shadow-[0_8px_16px_-6px_rgba(0,0,0,0.1)] rounded-xl">
                        <iframe
                            class="w-full rounded-xl shadow-md border border-gray-100"
                            height="240"
                            src="https://www.youtube.com/embed/5WWI3o6-cnY?si=wC63Hn5hs1GQn66H" title="YouTube video player" frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                            allowfullscreen>
                        </iframe>
                    </div>

                    <!-- KARTU LEBIH PANJANG: max-h dinaikkan ke [480px] agar menampung teks lebih banyak sebelum scroll -->
                    <div class="max-h-[480px] overflow-y-auto pr-2 custom-scroll">
                        <h1 class="text-base font-semibold text-gray-700 leading-relaxed">
                            Sayaaaaaaangkuu 🤍<br><br>

                            Selamat ulang tahun yaa Sayaaaaangkuu...

                            Semoga di umur yang baru ini sayang selalu diberikan kesehatan,
                            kebahagiaan, umur yang berkah, rezeki yang melimpah,
                            serta dimudahkan segala urusannya oleh Allah SWT.
                            Aamiin Ya Rabbal Alamin 🤲

                            <br><br>

                            Terima kasih sudah hadir dan menjadi bagian terindah
                            dalam hidup aa. Terima kasih sudah selalu sabar,
                            selalu mendukung, dan selalu ada di setiap cerita yang kita lalui.

                            <br><br>

                            Aa mungkin engga sempurna,
                            tapi aa akan selalu berusaha menjadi yang terbaik untuk neeeng. 

                            <br><br>

                            Semoga semua impian dan harapan yang sayaaang inginkan
                            dapat terwujud satu per satu yaaa. Semoga apa yang kita usahakan sekarang bisa terwujud di tahun depan ya sayaaangnya aa. 
                            
                            <br><br>

                            Aa akan selalu mendoakan
                            yang terbaik untuk neeeng dan untuk kita kedepannya ya sayaaaaaangku🤍 

                            <br><br>

                            I Love You Today,
                            Tomorrow,
                            Forever,
                            and Always 🤍✨
                        </h1>

                        <h2 class="mt-5 text-center text-pink-500 font-bold text-lg">
                            - With Love, Deni -
                        </h2>
                    </div>

                    <!-- Tombol Tutup -->
                    <button
                        onclick="refreshPage()"
                        class="mt-4 w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-xl transition duration-300">
                        Tutup 🤍
                    </button>

                </div>
            `;
        }

        function refreshPage(){
            location.reload();
        }
    </script>

</body>
</html>
